<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />

              secondary: "#735c00",

              "on-secondary-fixed": "#241a00",
              "error-container": "#ffdad6",

    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Montserrat:wght@600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      /* Modernist geometric subtle pattern mimicking Girih essence via pure CSS */
      .bg-islamic-pattern {
        background-color: #f9f9ff;
        background-image:
          linear-gradient(
            30deg,
            #d0daef 12%,
            transparent 12.5%,
            transparent 87%,
            #d0daef 87.5%,
            #d0daef
          ),
          linear-gradient(
            150deg,
            #d0daef 12%,
            transparent 12.5%,
            transparent 87%,
            #d0daef 87.5%,
            #d0daef
          ),
          linear-gradient(
            30deg,
            #d0daef 12%,
            transparent 12.5%,
            transparent 87%,
            #d0daef 87.5%,
            #d0daef
          ),
          linear-gradient(
            150deg,
            #d0daef 12%,
            transparent 12.5%,
            transparent 87%,
            #d0daef 87.5%,
            #d0daef
          ),
          linear-gradient(
            60deg,
            #d9e3f7 25%,
            transparent 25.5%,
            transparent 75%,
            #d9e3f7 75%,
            #d9e3f7
          ),
          linear-gradient(
            60deg,
            #d9e3f7 25%,
            transparent 25.5%,
            transparent 75%,
            #d9e3f7 75%,
            #d9e3f7
          );
        background-size: 80px 140px;
        background-position:
          0 0,
          0 0,
          40px 70px,
          40px 70px,
          0 0,
          40px 70px;
        opacity: 0.3; /* Keep it very subtle as mandated */
      }
    </style>
  </head>
  <body
    class="bg-background min-h-screen relative flex items-center justify-center p-container-padding-mobile md:p-container-padding-desktop"
  >
    <!-- Decorative Background Layer -->
    <div
      class="absolute inset-0 bg-islamic-pattern z-0 pointer-events-none"
    ></div>
    <!-- Main Content Canvas (Login Box) -->
    <main
      class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] p-8 md:p-12 flex flex-col gap-10 relative z-10 border border-outline-variant/30"
    >
      <!-- Branding Section -->
      <header class="flex flex-col items-center text-center gap-3">
        <div
          class="w-20 h-20 rounded-full bg-surface-container-high flex items-center justify-center mb-2 ring-4 ring-surface shadow-sm"
        >
          <span
            class="material-symbols-outlined text-primary"
            style="font-size: 40px; font-variation-settings: &quot;FILL&quot; 1"
            >mosque</span
          >
        </div>
        <div>
          <h1 class="font-headline-md text-headline-md text-on-surface">
            Masjid Al-Falah
          </h1>
          <p class="font-label-md text-label-md text-primary mt-1">
            SMART MASJID PRO
          </p>
        </div>
        <p class="font-body-md text-body-md text-on-surface-variant mt-2">
          Secure Administrative Access
        </p>
      </header>
      <!-- Login Form -->
      <form class="flex flex-col gap-6" onsubmit="event.preventDefault()">
        <div class="flex flex-col gap-4">
          <!-- Username Field -->
          <div class="flex flex-col gap-2">
            <label
              class="font-label-md text-label-md text-on-surface"
              for="username"
              >Username</label
            >
            <div class="relative">
              <div
                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"
              >
                <span class="material-symbols-outlined text-outline-variant"
                  >person</span
                >
              </div>
              <input
                class="w-full pl-12 pr-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline-variant"
                id="username"
                name="username"
                placeholder="Enter admin ID"
                required=""
                type="text"
              />
            </div>
          </div>
          <!-- Password Field -->
          <div class="flex flex-col gap-2">
            <label
              class="font-label-md text-label-md text-on-surface"
              for="password"
              >Password</label
            >
            <div class="relative">
              <div
                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"
              >
                <span class="material-symbols-outlined text-outline-variant"
                  >lock</span
                >
              </div>
              <input
                class="w-full pl-12 pr-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline-variant"
                id="password"
                name="password"
                placeholder="Enter secure password"
                required=""
                type="password"
              />
              <button
                class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface transition-colors"
                type="button"
              >
                <span class="material-symbols-outlined">visibility_off</span>
              </button>
            </div>
          </div>
        </div>
        <!-- Actions -->
        <div class="flex flex-col gap-5 mt-4">
          <button
            class="w-full bg-primary hover:bg-primary-container text-on-primary font-label-md text-label-md py-4 rounded-lg transition-colors flex justify-center items-center gap-2 shadow-sm"
            type="submit"
          >
            Masuk Ke Panel Admin
            <span class="material-symbols-outlined" style="font-size: 20px"
              >arrow_forward</span
            >
          </button>
          <div class="text-center">
            <a
              class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors"
              href="#"
              >Lupa kata sandi?</a
            >
          </div>
        </div>
      </form>
    </main>
    <script>
      // Tombol login: cek username & password lalu redirect
      document.querySelector("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        // Sementara pakai hardcode dulu, nanti bisa diganti API
        if (username === "admin" && password === "admin123") {
          window.location.href = "/dashboard.html";
        } else {
          alert("Username atau password salah!");
        }
      });
    </script>
  </body>
</html>
